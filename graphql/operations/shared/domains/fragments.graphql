    signalToNoise {
      value
      at {
        nanometers
      }
    }
    timeAndCount {
      at {
        nanometers
      }
      time {
        seconds
      }
      count
    }
  }
}


fragment ghostIfuDetails on GhostIfu {
    defaultIfu1Agitator
    defaultIfu2Agitator
    explicitIfu1Agitator
    explicitIfu2Agitator
    ifu1Agitator
    ifu2Agitator
    resolutionMode
    stepCount
    blue {
        ...ghostDetectorConfigDetails
    }
    red {
        ...ghostDetectorConfigDetails
    }
    skyPosition {
      dec {
        degrees
      }
      ra {
        degrees
      }
    }
    slitViewingCameraExposureTime {
        seconds
    }
}


fragment VisitorDetails on Visitor {
    mode
