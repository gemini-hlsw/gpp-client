fragment ScienceRequirementsDetails on ScienceRequirements {
  mode
}

fragment ConstraintSetDetails on ConstraintSet {
  imageQuality
  cloudExtinction
  skyBackground
  waterVapor
  elevationRange {
    airMass {
      min
      max
    }
    hourAngle {
      minHours
      maxHours
    }
  }
}

fragment TimingWindowDetails on TimingWindow {
  inclusion
  startUtc
  end {
    __typename
    ... on TimingWindowEndAt {
      atUtc
    }
    ... on TimingWindowEndAfter {
      after {
        seconds
      }
      repeat {
        period {
          seconds
        }
        times
      }
    }
  }
}

# NOTE: do not factor exposureTimeMode selections into a shared
# `ExposureTimeModeDetails` fragment. Grackle (the ODB server) raises a false
# "Fragment cycle" validation error when two sibling fragments spread the same
# fragment by name (see GPC-151); the selections below must stay inlined.

fragment GmosNorthLongSlitDetails on GmosNorthLongSlit {
  grating
  filter
  fpu
  centralWavelength {
    nanometers
  }
  offsets {
    arcseconds
  }
  xBin
  yBin
}

fragment GmosSouthLongSlitDetails on GmosSouthLongSlit {
  grating
  filter
  fpu
  centralWavelength {
    nanometers
  }
  offsets {
    arcseconds
  }
  xBin
  yBin
}

fragment GmosNorthImagingDetails on GmosNorthImaging {
  filters {
