mutation createProgram(
  $properties: ProgramPropertiesInput
  $includeDeleted: Boolean! = false
) {
  createProgram(input: { SET: $properties }) {
    program {
      ...ProgramDetail
      ...ProgramGroupElements
    }
  }
}

mutation updatePrograms(
  $properties: ProgramPropertiesInput!
  $where: WhereProgram
  $limit: NonNegInt
  $includeDeleted: Boolean! = false
) {
  updatePrograms(
    input: {
      SET: $properties
      WHERE: $where
      LIMIT: $limit
      includeDeleted: $includeDeleted
    }
  ) {
    hasMore
    programs {
      ...ProgramDetail
      ...ProgramGroupElements
    }
  }
}

mutation updateProgramById(
  $programId: ProgramId!
  $properties: ProgramPropertiesInput!
  $includeDeleted: Boolean! = false
) {
  updatePrograms(
    input: {
      SET: $properties
      WHERE: { id: { EQ: $programId } }
      LIMIT: 1
      includeDeleted: $includeDeleted
    }
  ) {
    hasMore
    programs {
      ...ProgramDetail
      ...ProgramGroupElements
    }
  }
}

mutation restoreProgramById($programId: ProgramId!) {
  updatePrograms(
    input: {
      SET: { existence: PRESENT }
      WHERE: { id: { EQ: $programId } }
      LIMIT: 1
      includeDeleted: true
    }
  ) {
    hasMore
    programs {
      ...ProgramDetail
      allGroupElements(includeDeleted: true) {
        parentGroupId
        observation {
          id
          groupId
        }
        group {
          id
          name
          minimumRequired
          ordered
          parentId
          parentIndex
          minimumInterval {
            seconds
          }
          maximumInterval {
            seconds
          }
          system
        }
      }
    }
  }
}

mutation deleteProgramById($programId: ProgramId!) {
  updatePrograms(
    input: {
      SET: { existence: DELETED }
      WHERE: { id: { EQ: $programId } }
      LIMIT: 1
      includeDeleted: false
    }
  ) {
    hasMore
    programs {
      ...ProgramDetail
      allGroupElements(includeDeleted: false) {
        parentGroupId
        observation {
          id
          groupId
        }
        group {
          id
          name
          minimumRequired
          ordered
          parentId
          parentIndex
          minimumInterval {
            seconds
          }
          maximumInterval {
            seconds
          }
          system
        }
      }
    }
  }
}
