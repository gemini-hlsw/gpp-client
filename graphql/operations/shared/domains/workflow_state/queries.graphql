query getObservationWorkflowStateById($observationId: ObservationId!) {
  observation(observationId: $observationId) {
    ...ObservationCore
    program {
      ...ProgramCore
    }
    workflow {
      ...WorkflowDetails
    }
  }
}

query getObservationWorkflowStateByReference(
  $observationReference: ObservationReferenceLabel!
) {
  observation(observationReference: $observationReference) {
    ...ObservationCore
    program {
      ...ProgramCore
    }
    workflow {
      ...WorkflowDetails
    }
  }
}
