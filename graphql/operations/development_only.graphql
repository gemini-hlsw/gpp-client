# =============================================================================
# SchedulerObservationUpdates
# Uses a ObsCalculationUpdate subscription to retrieve update events from
# executed sequences/observations.
# =============================================================================

subscription SchedulerObservationsUpdates($executableOnly: Boolean) {
  obscalcUpdate (input: {
     executableOnly: $executableOnly
  }) {
    oldCalculationState
    newCalculationState
    editType
    value {
      id
      observationTime
      program {
        active {
          end
          start
        }
      }
      workflow {
        value {
          state
        }
      }
      execution {
        visits {
          matches {
            observation {
              id
            }
            atomRecords {
              matches {
                executionState
                id
                }
              }
            }
          }
        }
      targetEnvironment {
                    # ...TargetEnvironmentDetails
                    asterism {
                      name
                      sidereal {
                        #...SiderealTargetDetails
                        ra {
                          hours
                          hms
                          degrees
                        }
                        dec {
                          degrees
                          dms
                        }
                        epoch
                      }
                      nonsidereal {
                        #...NonsiderealTargetDetails
                        des
                        keyType
                        key
                      }
                    }
                    explicitBase {
                      ra {
                        hms
                      }
                      dec {
                        dms
                      }
                    }
                  }
      constraintSet {
                #...ConstraintSetDetails
                imageQuality
                cloudExtinction
                skyBackground
                waterVapor
                elevationRange {
                  airMass {
                    min
                    max
                  }
                  hourAngle {
                    minHours
                    maxHours
                  }
                }
              }
      timingWindows {
                #...TimingWindowDetails
                  inclusion
                  startUtc
                  end {
                    __typename
                    ... on TimingWindowEndAt {
                      atUtc
                    }
                    ... on TimingWindowEndAfter {
                      after {
                        seconds
                      }
                      repeat {
                        period {
                          seconds
                        }
                        times
                      }
                    }
                  }
                }
    }
  }
}


fragment ObservationExecution on Observation {
    execution {
    ...ExecutionDetails
  }
}

fragment ExecutionDetails on Execution {
  digest {
    value {
      acquisition {
        timeEstimate {
          total {
            seconds
          }
        }
      }
      setup {
        full{
          seconds
        }
        reacquisition {
          seconds
        }
      }
    }
  }
}

# =============================================================================
# fragments to add IGRINS2 and Visitor instruments to the ObservingMode data.
# =============================================================================


fragment Igrins2LongSlitDetails on Igrins2LongSlit {
  # NOTE: exposureTimeMode is inlined here instead of spreading
  # ...ExposureTimeModeDetails on purpose. Grackle raises a #false-positive
  # "Fragment cycle starting from 'ObservationDetails'" for the
  # dev-injected named edge Igrins2LongSlitDetails -> ExposureTimeModeDetails,
  # even though the identical Gmos/Flamingos edges validate fine. Inlining the
  # selection breaks that named edge and clears the false cycle.
  exposureTimeMode {
    signalToNoise {
      value
      at {
        nanometers
      }
    }
    timeAndCount {
      time {
        seconds
      }
      count
      at {
        nanometers
      }
    }
  }
  offsetMode
  defaultOffsetMode
  explicitOffsetMode
  saveSVCImages
  defaultSaveSVCImages
  explicitSaveSVCImages
  offsets {
    q {
      arcseconds
    }
    p {
      arcseconds
    }
  }
  defaultOffsets {
    q {
      arcseconds
    }
    p {
      arcseconds
    }
  }
  explicitOffsets {
    q {
      arcseconds
    }
    p {
      arcseconds
    }
  }
  telluricType {
    tag
    starTypes
  }
}

fragment VisitorDetails on Visitor {
    mode
    name
    centralWavelength {
      nanometers
    }
    totalRequestTime {
      seconds
    }
    agsDiameter{
      dms
      hms
    }

}

fragment Igrins2LongSlitAndVisitorOnObservingMode on ObservingMode {
  igrins2LongSlit {
    ...Igrins2LongSlitDetails
  }
  visitor {
    ...VisitorDetails
  }
}
