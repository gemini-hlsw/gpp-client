query getTargetById($targetId: TargetId!, $includeDeleted: Boolean! = false) {
  target(targetId: $targetId) {
    ...TargetDetails
    ...TargetProgramSummary
  }
}

query getTargets(
  $where: WhereTarget
  $offset: TargetId
  $limit: NonNegInt
  $includeDeleted: Boolean! = false
) {
  targets(
    WHERE: $where
    OFFSET: $offset
    LIMIT: $limit
    includeDeleted: $includeDeleted
  ) {
    hasMore
    matches {
      ...TargetDetails
      ...TargetProgramSummary
    }
  }
}
