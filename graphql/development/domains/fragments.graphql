fragment ScienceRequirementsDetails on ScienceRequirements {
  mode
}

fragment ConstraintSetDetails on ConstraintSet {
  imageQuality
  cloudExtinction
  skyBackground
  waterVapor
  elevationRange {
    airMass {
      min
      max
    }
    hourAngle {
      minHours
      maxHours
    }
  }
}

fragment TimingWindowDetails on TimingWindow {
  inclusion
  startUtc
  end {
    ... on TimingWindowEndAt {
      atUtc
    }
    ... on TimingWindowEndAfter {
      after {
        seconds
      }
      repeat {
        period {
          seconds
        }
        times
      }
    }
  }
}

fragment ExposureTimeModeDetails on ExposureTimeMode {
  signalToNoise {
    value
    at {
      nanometers
    }
  }
  timeAndCount {
    time {
      seconds
    }
    count
    at {
      nanometers
    }
  }
}

fragment GmosNorthLongSlitDetails on GmosNorthLongSlit {
  grating
  filter
  fpu
  centralWavelength {
    nanometers
  }
  offsets {
    arcseconds
  }
  xBin
  yBin
}

fragment GmosSouthLongSlitDetails on GmosSouthLongSlit {
  grating
  filter
  fpu
  centralWavelength {
    nanometers
  }
  offsets {
    arcseconds
  }
  xBin
  yBin
}

fragment GmosNorthImagingDetails on GmosNorthImaging {
  filters {
    filter
  }
  bin
}

fragment GmosSouthImagingDetails on GmosSouthImaging {
  filters {
    filter
  }
  bin
}

fragment Flamingos2LongSlitDetails on Flamingos2LongSlit {
  decker
  defaultDecker
  defaultOffsets {
    q {
      arcseconds
    }
    p {
      arcseconds
    }
  }
  disperser
  filter
  fpu
  telluricType {
    tag
    starTypes
  }
  exposureTimeMode {
    ...ExposureTimeModeDetails
  }
  explicitReadMode
  explicitReads
  explicitDecker
  readoutMode
  defaultReadoutMode
  offsets {
    q {
      arcseconds
    }
    p {
      arcseconds
    }
  }
  acquisition {
    exposureTimeMode {
      ...ExposureTimeModeDetails
    }
  }
  initialDisperser
  initialFilter
  initialFpu
}

fragment ObservingModeDetails on ObservingMode {
  instrument
  mode
  gmosNorthLongSlit {
    ...GmosNorthLongSlitDetails
  }
  gmosSouthLongSlit {
    ...GmosSouthLongSlitDetails
  }
  gmosNorthImaging {
    ...GmosNorthImagingDetails
  }
  gmosSouthImaging {
    ...GmosSouthImagingDetails
  }
  flamingos2LongSlit {
    ...Flamingos2LongSlitDetails
  }
}
