name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v26.5.0 or v26.5.0.dev1."
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate release
        run: python scripts/validate_release.py "${{ inputs.tag }}"

      - name: Check tag does not already exist
        run: |
          if git rev-parse "${{ inputs.tag }}" >/dev/null 2>&1; then
            echo "Tag already exists: ${{ inputs.tag }}"
            exit 1
          fi

      - name: Show release commit
        run: |
          echo "Tagging commit:"
          git log -1 --oneline

      - name: Create and push tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ inputs.tag }}" -m "Release ${{ inputs.tag }}."
          git push origin "${{ inputs.tag }}"

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          draft: true
          generate_release_notes: true
