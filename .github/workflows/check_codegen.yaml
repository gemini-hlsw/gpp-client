name: Codegen Check

on:
  pull_request:
    branches: [main]
    paths:
      - "graphql/**"
      - "scripts/run_codegen.py"
      - "src/custom_plugins/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/check_codegen.yaml"

  push:
    branches: [main]

  workflow_dispatch:

concurrency:
  group: codegen-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codegen_check:
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install uv and setup the python version
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.11"

      - name: Install the project with codegen dependencies
        run: uv sync --locked --group codegen

      - name: Run development codegen
        run: uv run --group codegen python scripts/run_codegen.py DEVELOPMENT

      - name: Run production codegen
        run: uv run --group codegen python scripts/run_codegen.py PRODUCTION

      - name: Minimize uv cache
        run: uv cache prune --ci
