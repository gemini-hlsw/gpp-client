name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  pypi-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    environment:
      name: pypi

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: "3.11"

      - name: Clean distributions
        run: rm -rf dist

      - name: Build distributions
        run: uv build

      - name: Smoke test wheel
        run: |
          uv venv /tmp/gpp-client-smoke --clear
          uv pip install --python /tmp/gpp-client-smoke/bin/python dist/*.whl
          /tmp/gpp-client-smoke/bin/python -c "import gpp_client; print(gpp_client.__version__)"

      - name: Publish distributions to PyPI
        run: uv publish --trusted-publishing always

      - name: Minimize uv cache
        run: uv cache prune --ci
